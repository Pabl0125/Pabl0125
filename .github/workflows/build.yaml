name: Actualizar Estadísticas del Perfil

on:
  schedule:
    # Se ejecuta todos los días a la medianoche UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña "Actions"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil

      - name: Ejecutar script de actualización
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
        run: python update_readme.py

      - name: Hacer Commit y Push de los cambios
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          # Solo hace commit si hay cambios reales en el archivo
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática de estadísticas" && git push)
